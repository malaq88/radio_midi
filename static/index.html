<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Radio MIDI</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
</head>
<body class="npm-hidden">
  <div id="loading-overlay" class="loading-overlay hidden" aria-hidden="true">
    <div class="loading-spinner"></div>
    <span>A carregar stream…</span>
  </div>

  <div
    id="drawer-backdrop"
    class="drawer-backdrop"
    aria-hidden="true"
  ></div>

  <div class="app">
    <aside class="sidebar" id="sidebar" aria-label="Navegação principal">
      <div class="sidebar-brand">
        <span class="logo-dot" aria-hidden="true"></span>
        <span class="logo-text">Radio MIDI</span>
      </div>
      <nav class="sidebar-nav" aria-label="Principal">
        <button type="button" class="nav-item active" data-view="home" data-nav title="Início">
          <span class="nav-icon" aria-hidden="true">⌂</span>
          <span class="nav-label">Início</span>
        </button>
        <button type="button" class="nav-item" data-view="artists" data-nav title="Artistas">
          <span class="nav-icon" aria-hidden="true">♪</span>
          <span class="nav-label">Artistas</span>
        </button>
        <button type="button" class="nav-item" data-view="albums" data-nav title="Álbuns">
          <span class="nav-icon" aria-hidden="true">▣</span>
          <span class="nav-label">Álbuns</span>
        </button>
        <button type="button" class="nav-item" data-view="radio" data-nav title="Rádio aleatória">
          <span class="nav-icon" aria-hidden="true">📻</span>
          <span class="nav-label">Rádio aleatória</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <p class="hint">Streaming local · FastAPI</p>
      </div>
    </aside>

    <main class="main" id="main">
      <header class="main-header">
        <div class="main-header-row">
          <button
            type="button"
            id="btn-menu"
            class="btn-menu"
            aria-label="Abrir menu"
            aria-expanded="false"
            aria-controls="sidebar"
          >
            <span class="btn-menu-icon" aria-hidden="true">☰</span>
          </button>
          <div class="main-header-text">
            <h1 id="page-title" class="page-title">Início</h1>
            <p id="page-subtitle" class="page-subtitle">Escolhe o que ouvir</p>
          </div>
        </div>
      </header>
      <div id="content" class="content"></div>
    </main>
  </div>

  <div
    id="now-playing-mini"
    class="now-playing-mini hidden"
    role="region"
    aria-label="A reproduzir (resumo)"
    aria-hidden="true"
  >
    <div class="now-playing-mini-inner">
      <div class="npm-art">
        <img id="npm-cover" class="npm-cover hidden" alt="" width="40" height="40" />
        <div id="npm-cover-fallback" class="npm-cover-fallback" aria-hidden="true">♪</div>
      </div>
      <div class="npm-meta">
        <div id="npm-title" class="npm-title">—</div>
        <div id="npm-sub" class="npm-sub"></div>
      </div>
      <button type="button" id="npm-play" class="npm-play" aria-label="Reproduzir ou pausar">
        <span id="npm-icon-play" class="npm-play-icon">▶</span>
        <span id="npm-icon-pause" class="npm-play-icon hidden">⏸</span>
      </button>
    </div>
  </div>

  <footer class="player" role="region" aria-label="Reprodutor">
    <div class="player-inner">
      <div class="player-track">
        <div class="player-art">
          <img id="player-cover" class="player-cover hidden" alt="" width="56" height="56" loading="lazy" />
          <div id="player-cover-fallback" class="player-cover-fallback" aria-hidden="true">♪</div>
        </div>
        <div class="player-meta">
          <div id="player-title" class="player-title">Nada em reprodução</div>
          <div id="player-sub" class="player-sub"></div>
        </div>
      </div>

      <div class="player-controls" id="player-controls">
        <div class="player-transport" role="group" aria-label="Controlos de reprodução">
          <button
            type="button"
            id="btn-shuffle"
            class="btn-transport btn-transport--aux btn-shuffle"
            aria-label="Modo aleatório"
            aria-pressed="true"
            title="Aleatório / ordem fixa"
          >
            <svg class="transport-svg transport-svg--shuffle" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="m18 14 4 4-4 4" />
              <path d="M2 18h1.92a4 4 0 0 0 3.31-1.7l5.37-8.52a4 4 0 0 1 3.3-1.7H22" />
              <path d="m18 2 4 4-4 4" />
              <path d="M2 6h1.92a4 4 0 0 1 3.37 1.86l5.37 8.18A4 4 0 0 0 15.57 18H22" />
            </svg>
          </button>
          <div class="player-transport-core">
            <button type="button" id="btn-prev" class="btn-transport btn-skip" aria-label="Anterior ou reiniciar">
              <svg class="transport-svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <rect x="5" y="5" width="2.75" height="14" rx="0.5" />
                <path d="M10.5 6.2v11.6L19.5 12 10.5 6.2z" />
              </svg>
            </button>
            <button type="button" id="btn-play" class="btn-play" aria-label="Reproduzir ou pausar">
              <span id="icon-play" class="play-icon" aria-hidden="true">
                <svg class="play-icon-svg" viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M8 5.82v12.36L18.18 12 8 5.82z" /></svg>
              </span>
              <span id="icon-pause" class="play-icon hidden" aria-hidden="true">
                <svg class="play-icon-svg" viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
                  <path d="M6 5h4.25v14H6V5zm7.75 0H18v14h-4.25V5z" />
                </svg>
              </span>
            </button>
            <button type="button" id="btn-next" class="btn-transport btn-skip" aria-label="Seguinte">
              <svg class="transport-svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M4.5 6.2L13.5 12l-9 5.8V6.2z" />
                <rect x="16.25" y="5" width="2.75" height="14" rx="0.5" />
              </svg>
            </button>
          </div>
        </div>
        <div class="progress-wrap">
          <div id="progress-bar" class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
            <div id="progress-indeterminate" class="progress-indeterminate hidden"></div>
          </div>
          <div class="progress-labels">
            <span id="time-current">—:—</span>
            <span id="time-total">—:—</span>
          </div>
        </div>
      </div>

      <div class="player-volume">
        <span class="vol-icon" aria-hidden="true">🔊</span>
        <input type="range" id="volume" min="0" max="100" value="100" aria-label="Volume" />
      </div>
    </div>
    <audio id="audio" preload="none" crossorigin="anonymous"></audio>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
